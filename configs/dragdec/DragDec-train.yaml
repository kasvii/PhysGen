exp_root_dir: "outputs"
name: "DragDec"
tag: "dragdec_train"
seed: 0

system:
  sample_posterior: true
  shape_model_type: "michelangelo-autoencoder"
  shape_model_ckpt: ./outputs/ShapeVAE/shapevae_output/ckpts/last.ckpt
  shape_model:
    pretrained_model_name_or_path: ./outputs/ShapeVAE/shapevae_output/ckpts/last.ckpt
    embed_dim: 64
    point_feats: 3  
    out_dim: 1 
    embed_type: "fourier"
    num_freqs: 8
    include_pi: false
    heads: 12
    width: 768
    num_encoder_layers: 8
    num_decoder_layers: 16
    use_ln_post: true
    init_scale: 0.25
    qkv_bias: false
    use_flash: true
    use_checkpoint: true
    use_downsample: true

  drag_model:
    pretrained_model_name_or_path: ""
    sample_posterior: true
    embed_dim: 64
    point_feats: 3  
    out_dim: 1 
    embed_type: "fourier"
    num_freqs: 8
    include_pi: false
    heads: 12
    width: 768
    num_latents: 256
    num_encoder_layers: 8
    num_decoder_layers: 3
    use_ln_post: true
    init_scale: 0.25
    qkv_bias: false
    use_flash: true
    use_checkpoint: true
    use_downsample: true

    noisytrain: true 
    z_scale_factor: 1.0039506158752403
    train_eps: 0.001
    sample_eps: 0.001

    DRAG_MEAN: 0.0
    DRAG_STD: 1.0
  
    optimizer:
      name: AdamW
      args:
        lr: 1.e-3
        betas: [0.9, 0.99]
        eps: 1.e-6

    scheduler:
      name: CosineAnnealingLR
      args:
        T_max: 1500
        eta_min: 1e-5

data_type: "drag-datamodule"
data:
  data_root: "data/drivaernet_plus/surfaces"
  csv_path: "data/drivaernet_plus/drag/DrivAerNetPlusPlus_Cd_8k_Updated.csv"
  subset_dir: "train_val_test_splits"
  root_dir: "./data/dataset1"
  data_type: "sdf"
  
  add_noise: true
  rotate_points: false
  
  batch_size: 196
  num_workers: 12
  
  small: false

trainer:
  num_nodes: 1
  max_epochs: 1500
  log_every_n_steps: 5
  num_sanity_val_steps: 1
  check_val_every_n_epoch: 1
  enable_progress_bar: true
  precision: 16-mixed
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

checkpoint:
  save_last: true
  save_top_k: -1
  every_n_train_steps: 10000